services:
  postgres:
    image: postgres:16-alpine
    container_name: artlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - artlab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artlab-backend
    restart: unless-stopped
    env_file:
      - ./deploy/vps/.env.backend
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: artlab-frontend
    restart: unless-stopped
    environment:
      PORT: 4173
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: artlab-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/vps/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/vps/certbot/www:/var/www/certbot
      - ./deploy/vps/certbot/conf:/etc/letsencrypt

volumes:
  artlab_postgres_data:
