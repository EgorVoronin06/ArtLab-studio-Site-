services:
  postgres:
    image: postgres:16-alpine
    container_name: artlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: artlab_db
      POSTGRES_USER: artlab
      POSTGRES_PASSWORD: artlab123
    ports:
      - "5432:5432"
    volumes:
      - artlab_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artlab -d artlab_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  artlab_pg_data:
