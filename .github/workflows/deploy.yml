name: Deploy to Hosting

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OneDrive/Desktop/ArtLab.com/package-lock.json

      - name: Install Dependencies
        working-directory: OneDrive/Desktop/ArtLab.com
        run: npm ci

      - name: Build Frontend
        working-directory: OneDrive/Desktop/ArtLab.com
        run: npm run build

      - name: Deploy to Hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.0.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: OneDrive/Desktop/ArtLab.com/dist/
          server-dir: mysite.ru/public_html/
