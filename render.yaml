services:
  - type: web
    name: artlab-api
    runtime: node
    repo: https://github.com/EgorVoronin06/ArtLab-studio-Site-.git
    rootDir: OneDrive/Desktop/ArtLab.com/backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run prisma:push && npm run start:prod
    plan: free
    healthCheckPath: /news
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: ADMIN_PANEL_PASSWORD
        sync: false
      - key: ADMIN_PANEL_EMAIL
        value: voronine15@mail.ru
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: artlab-frontend
    runtime: static
    repo: https://github.com/EgorVoronin06/ArtLab-studio-Site-.git
    rootDir: OneDrive/Desktop/ArtLab.com
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        sync: false
